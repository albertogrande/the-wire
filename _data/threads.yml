# Running threads — the publication's open storylines. Mirrors the threads
# section of reports/MEMORY.md so /threads/ and the dashboard can render them
# as a navigable map. The weekly desk updates momentum and appends issue links.
#
# momentum: up (gaining) | steady | down (stalling)
# tension:  optional — evidence cutting against the thread

- slug: ai-goes-public
  title: "AI goes public / the repricing"
  momentum: up
  summary: >-
    Anthropic filed its S-1 (Jun 1, ~$965B, ~$47B run-rate); SpaceX–xAI
    roadshow; OpenAI's confidential S-1 confirmed Jun 8–9 (~$1T target,
    Goldman + Morgan Stanley, listing late 2026). The market now punishes
    deceleration (Broadcom −15%, Nasdaq −4% Jun 5). The AI trade has become a
    macro variable.
  tension: >-
    W24 added a new risk-factor line — a flagship model can be administratively
    switched off overnight (the Fable 5 export ban).
  issues:
    - { label: "2026-W23", link: "/reports/2026-W23.html" }
    - { label: "2026-W24", link: "/reports/2026-W24.html" }

- slug: ai-coding-subsidy-died
  title: "The AI coding subsidy died"
  momentum: up
  summary: >-
    Copilot token billing went live Jun 1 (10–50× bills, Opus multiplier
    7.5×→27×, paid code review); Cursor seat split; Anthropic Agent SDK credit
    split Jun 15. Flat-rate AI tooling is ending industry-wide — the meter is a
    boundary, not a business; the end state is vertical integration.
  issues:
    - { label: "2026-W23", link: "/reports/2026-W23.html" }
    - { label: "Dive · The Meter Is the Confession", link: "/reports/deep-dives/2026-06-07-ai-coding-honest-pricing.html" }

- slug: channel-war-offramps
  title: "The channel war / off-ramps"
  momentum: up
  summary: >-
    Model and open harness both commoditizing (Kimi K2.7-Code beats Opus 4.8 on
    MCPMark 81.1/76.4 at ~1/10 price; OpenCode 8M MAU, MIT), so spend moved to
    distribution: Google kills Gemini CLI for closed `agy`; OpenAI buys the Ona
    surface + rents Oracle's Universal Credits rail ($638B RPO); Anthropic's
    $150M Claude Corps seeds an install base. Four off-ramps —
    terminal/environment/rail/install base (+political). The moat is the
    channel, not the weights. W24: the political off-ramp went live — export
    controls hit the closed/legible US leader while open weights walk free.
  issues:
    - { label: "Dive · The Channel Was the Product", link: "/reports/deep-dives/2026-06-09-channel-was-the-product.html" }
    - { label: "Dive · You Cannot Export-Control a Model", link: "/reports/deep-dives/2026-06-15-cannot-export-control-a-model.html" }
    - { label: "Dive · The Coding Model You Can Run", link: "/reports/deep-dives/2026-06-17-local-coding-model-memory-budget.html" }

- slug: supply-chain-vs-throughput
  title: "Supply chain vs. AI throughput"
  momentum: up
  summary: >-
    Miasma (32 Red Hat npm packages, valid SLSA provenance via stolen OIDC)
    plus IronWorm (36 packages harvesting AI API keys). Provenance and
    install-script scanning both defeated. Review/trust infra is the
    bottleneck while AI code generation explodes (Anthropic: 80% of merged
    code by Claude).
  tension: >-
    Defenses ship at institution speed, attacks at copy-paste speed; the
    exploited OIDC ref-binding hole remains unfixed (npm v12 closes install
    scripts instead).
  issues:
    - { label: "2026-W23", link: "/reports/2026-W23.html" }
    - { label: "Dive · The Trust Stack", link: "/reports/deep-dives/2026-06-10-trust-stack-human-speed.html" }

- slug: autonomy-before-brakes
  title: "Autonomy before its brakes"
  momentum: up
  summary: >-
    Agents shipped proactive-by-default (Fable 5 "relentlessly proactive,"
    Claude Code nested sub-agents 5-deep + doubled 5h limits, FablePool) before
    the cost-control/consent/observability layer. Canaries: a DN42 agent ran a
    $6,531 AWS bill in ~24h (cut to $1,894); Anthropic apologized for an
    invisible Fable distillation guardrail ("stealth throttling"). Liability
    (the operator eats it; AWS has no hard cap by design) plus disclosure
    (Colorado AI Act, FCC KYC FNPRM) = undisclosed automation becoming a
    regulated category.
  issues:
    - { label: "Dive · Autonomy Shipped Before Its Brakes Did", link: "/reports/deep-dives/2026-06-08-autonomy-before-brakes.html" }

- slug: platforms-eat-the-layer
  title: "Platforms eat the layer"
  momentum: up
  summary: >-
    The LLMOps tool layer (gateway, tracing, eval, prompt store) is being
    absorbed from both ends. ClickHouse bought Langfuse (already built on
    ClickHouse; 23.1M SDK installs/mo) to own the trace store; Datadog ships a
    native AI gateway plus LLM-judge evals; model vendors expose traces and
    evals natively. TensorZero archived its repo Jun 12 and returned ~half its
    $7.3M seed despite Fortune-10 use and 11.6k stars. A wrapper around someone
    else's durable asset is a feature, not a company.
  issues:
    - { label: "Dive · LLMOps Is a Feature", link: "/reports/deep-dives/2026-06-11-llmops-not-a-company.html" }

