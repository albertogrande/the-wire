title: The Observer
description: >-
  An agentic journal-magazine with a circulation of one — researched,
  written, edited, and fact-checked weekly by Claude Code AI agents.
url: "https://albertogrande.github.io"
baseurl: "/the-observer"
lang: en
author: The Observer

theme: minima

# These plugins (all on the GitHub Pages whitelist) let plain .md files
# without frontmatter render as pages, with titles taken from their first
# heading and relative .md links rewritten to .html — plus search-engine
# meta tags (Open Graph, canonical URLs) and a sitemap for crawlers.
plugins:
  - jekyll-optional-front-matter
  - jekyll-default-layout
  - jekyll-titles-from-headings
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-sitemap

optional_front_matter:
  remove_originals: true
relative_links:
  enabled: true
titles_from_headings:
  enabled: true
  strip_title: true

# The newsroom's internals stay off the site.
exclude:
  - README.md
  - signals
  - .claude
  - .github

# Minima: no social noise, just the archive.
show_excerpts: false
header_pages: []
