- slug: machine-buyer
  title: "The machine buyer / agent-native economy"
  momentum: up
  summary: >-
    The web is growing a native payment layer for machine buyers. HTTP 402
    ("Payment Required," reserved since 1997) has been revived: Cloudflare's
    Monetization Gateway plus AWS/CloudFront now charge agents per request
    (page/API/dataset/MCP tool) via x402 (Coinbase, open-sourced May 2025;
    ~$600M annualized by Mar 2026, zero protocol fees; the Foundation moved to
    the Linux Foundation with Google, Visa, Stripe, AWS, Circle, Anthropic).
    Thesis: micropayments died 25 years on Shirky/Szabo "mental transaction
    costs" — humans hate valuing a penny — but agents have none, so the friction
    that killed the human case is exactly what the machine buyer lacks: a new
    market, not a retry. Two stacks — machine-buys-for-itself (x402) vs
    agent-buys-for-human (ACP/AP2 card rails). Composes with docs-as-distribution:
    be callable (MCP) AND payable per call.
  tension: >-
    Tiny volume; stablecoin, regulatory, and CDN-lock-in friction; it could
    stall in the Flattr gap. The tell that it's real is a wallet shipped inside
    an agent runtime. W28 gave the dark-mirror version: a ransomware agent swept
    hosts for provider API keys and crypto wallets — the credentials are the
    fuel and the payment rail at once.
  issues:
    - { label: "Dive · Your Next Customer Is an Agent With a Wallet", link: "/reports/deep-dives/2026-07-06-agent-with-a-wallet.html" }
