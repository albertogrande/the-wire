name: Newsroom Health

# A watchdog. A few hours after the nightly jobs (scout 00:00, dive 01:00,
# weekly Mon 02:00 Madrid), assert the publication's contract actually held:
#   1. today's signals were captured,
#   2. today's dive was written (Tue–Sun; Monday is the weekly's day),
#   3. the newest piece is actually LIVE on the site — an end-to-end check that
#      catches a committed-but-not-deployed regression (the GITHUB_TOKEN /
#      deploy-trigger class of bug).
# If anything is off, open or update one standing issue. No Claude, no quota.
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC = 08:00 Madrid, before the workday
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run health checks
        id: health
        run: |
          TODAY=$(TZ=Europe/Madrid date +%Y-%m-%d)
          DOW=$(TZ=Europe/Madrid date +%u) # 1=Mon … 7=Sun
          WEEK_FILE="signals/$(TZ=Europe/Madrid date +%G-W%V).md"
          BASE="https://albertogrande.github.io/the-wire"
          : > /tmp/problems.md

          # 1. today's signals captured
          if ! grep -q "^## $TODAY" "$WEEK_FILE" 2>/dev/null; then
            echo "- No scout signals for **$TODAY** in \`$WEEK_FILE\` — the scout may have failed." >> /tmp/problems.md
          fi

          # 2. today's dive written (Tue–Sun)
          if [ "$DOW" != "1" ] && ! ls reports/deep-dives/${TODAY}-*.md >/dev/null 2>&1; then
            echo "- No daily dive dated **$TODAY** in \`reports/deep-dives/\` — the dive may have failed." >> /tmp/problems.md
          fi

          # 3. the newest piece is actually live (end-to-end deploy check)
          LATEST=$(ls -1 reports/deep-dives/*.md 2>/dev/null | sort | tail -1)
          if [ -n "$LATEST" ]; then
            SLUG=$(basename "$LATEST" .md)
            URL="$BASE/reports/deep-dives/${SLUG}.html"
            if ! curl -sfI --max-time 30 "$URL" >/dev/null 2>&1; then
              echo "- Newest dive is committed but **not live**: \`$URL\` did not return OK. The deploy may have failed or not triggered." >> /tmp/problems.md
            fi
          fi

          if [ -s /tmp/problems.md ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Newsroom health check found problems:"; cat /tmp/problems.md
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "All clear: signals, dive, and live publish OK for $TODAY."
          fi

      - name: Open or update the health issue
        if: steps.health.outputs.ok == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create newsroom-health --color B60205 \
            --description "Automated publication health alert" 2>/dev/null || true
          {
            echo "The newsroom watchdog found problems this morning:"
            echo
            cat /tmp/problems.md
            echo
            echo "_Checked $(TZ=Europe/Madrid date '+%Y-%m-%d %H:%M') Madrid by the newsroom-health workflow. Close this once resolved._"
          } > /tmp/body.md
          # One standing issue at a time — comment on it rather than reopening the nag.
          EXISTING=$(gh issue list --label newsroom-health --state open --limit 1 --json number --jq '.[].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file /tmp/body.md
          else
            gh issue create --title "🚑 Newsroom health alert" --label newsroom-health --body-file /tmp/body.md
          fi
