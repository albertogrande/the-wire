name: Daily Scout

on:
  schedule:
    # Daily 22:00 UTC — Madrid sleep window (00:00 CEST / 23:00 CET), so CI
    # never competes with interactive use for the Max quota; still captures
    # the full day's signals.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Capture today's signals
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >
            Run the daily-scout skill (.claude/skills/daily-scout/SKILL.md):
            capture the last 24h of signals across the beats and append them
            to the current week's signals/ file exactly as the skill
            instructs. Write the file only — do not commit or push.
          show_full_output: true
          # Quota policy: the scout is a capture job, not the product —
          # Sonnet at ~0.6x Opus token cost; max-turns caps runaway loops.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Bash(date *),Bash(ls *),Bash(mkdir *)"

      # claude-code-action reports success even when Claude errors out on
      # turn one (is_error: true in the result JSON), so assert the scout's
      # contract instead: the skill always writes a "## <today>" heading,
      # even on a quiet day.
      - name: Verify the scout actually ran
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          WEEK_FILE="signals/$(date -u +%G-W%V).md"
          if ! grep -q "^## $TODAY" "$WEEK_FILE" 2>/dev/null; then
            echo "::error::No '## $TODAY' section in $WEEK_FILE — Claude wrote nothing (silent auth/API failure?). Check the Capture step transcript."
            exit 1
          fi

      - name: Commit signals
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -d signals ]; then git add signals/; fi
          if git diff --cached --quiet; then
            echo "No new signals captured."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Scout: signals for $(date -u +%Y-%m-%d)"
          # claude-code-action rewrites the remote URL to its app token and
          # revokes it when its step ends, so push with the workflow token.
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
