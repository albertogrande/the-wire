    - { label: "2026-W25", link: "/reports/2026-W25.html" }
    - { label: "Dive · Portability Is Not a Purchase", link: "/reports/deep-dives/2026-06-22-portability-is-not-a-purchase.html" }
    - { label: "Dive · Distillation Without Logits", link: "/reports/deep-dives/2026-06-27-distillation-without-logits.html" }
    - { label: "Dive · The Price Cut Wasn't For You", link: "/reports/deep-dives/2026-06-28-price-cut-is-a-weapon.html" }
