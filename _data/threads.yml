    - { label: "Dive · Your Agent Will Retry That Write", link: "/reports/deep-dives/2026-06-26-agent-retries-idempotent-writes.html" }
    - { label: "Dive · The 128K Window You Bought Is a 64K Window", link: "/reports/deep-dives/2026-06-30-long-context-vs-rag.html" }
