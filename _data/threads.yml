- slug: washington-vs-labs
  title: "Washington vs. the labs / safety as a weapon"
  momentum: up
  summary: >-
    Escalated hard in W24: Amazon's Jassy (Anthropic's biggest investor and a
    model competitor) told Treasury that Fable 5 yields cyberattack info;
    Commerce export-banned Fable 5 + Mythos 5 for all foreign nationals (incl.
    Anthropic's own foreign-born staff) Jun 12 — the first time the US switched
    off a public commercial model. The danger narrative Anthropic authored
    became a weapon used against it. Earlier context: the Obernolte–Trahan
    preemption draft; extraterritorial chip controls; DeepSeek's $7.4B
    state-backed raise. W25 (fallout consummated): the models stayed dark all
    week while demand routed around the ban in real time — GLM-5.2 open-released
    MIT (top open-weight, level w/ GPT-5.5 on GDPval), a local-model Ask HN
    thread surged, and OpenCode passed Claude Code on stars. Commerce then punted
    on blacklisting DeepSeek (100+ other firms added) — it can't aim at the open
    artifact. Wired named SK Telecom's Mythos demo as the thin trigger. The ban
    contained exactly one thing: Anthropic's own market. W26 (the new front):
    Anthropic told the Senate that Alibaba's Qwen lab ran 28.8M Claude exchanges
    via ~25k fake accounts (Apr 22–Jun 5) to distill its capabilities, and Sens.
    Hagerty and Kim are drafting a defense-bill amendment to sanction firms that
    misuse U.S. model outputs — the danger narrative pivoting from "the model is
    dangerous" to "the model is being stolen."
  tension: >-
    The ban is theater — three open frontier coding models (Kimi K2.7, GLM 5.2,
    MiMo) shipped the same week, so the capability is downloadable. And distillation
    is uncontractable: you own the outputs, there's no technical wall on a hard
    sample, so enforcement is detection + terms + sanctions, not a barrier.
  issues:
