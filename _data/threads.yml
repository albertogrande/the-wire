# Running threads — the publication's open storylines. Mirrors the threads
# section of reports/MEMORY.md so /threads/ and the dashboard can render them
# as a navigable map. The weekly desk updates momentum and appends issue links.
#
# momentum: up (gaining) | steady | down (stalling)
# tension:  optional — evidence cutting against the thread

- slug: ai-goes-public
  title: "AI goes public / the repricing"
  momentum: up
  summary: >-
    Anthropic filed its S-1 (Jun 1, ~$965B, ~$47B run-rate); SpaceX–xAI
    roadshow; OpenAI's confidential S-1 confirmed Jun 8–9 (~$1T target,
    Goldman + Morgan Stanley, listing late 2026). The market now punishes
    deceleration (Broadcom −15%, Nasdaq −4% Jun 5). The AI trade has become a
    macro variable. W25: the economics tightened in the open — OpenAI's leaked
    financials (per Fortune/Ars, unverified) show ~$21B operating loss on ~$13B
    of 2025 revenue; the FT reported enterprises reining in AI spend; Anthropic's
    subscription split (Jun 15) repriced programmatic usage. The frontier is sold
    below cost while a free MIT substitute (GLM-5.2) ships. W28: the *financing
    structure* of the AI trade examined — Nvidia's ~$110B of circular commitments
    (67% of revenue vs Lucent's 24%) revived the telecom-bust analogy, but the
    risk isn't the circle or Nvidia; it's the levered neocloud middle (CoreWeave
    $24.86B debt, interest 25.8% of revenue, 67% one customer). The end-riders are
    solvent (hyperscalers ~$451B OCF); the weak link is whoever can't refinance,
    this cycle's Winstar.
  tension: >-
    W24 added a new risk-factor line — a flagship model can be administratively
    switched off overnight (the Fable 5 export ban).
