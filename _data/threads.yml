- slug: ai-coding-subsidy-died
  title: "The AI coding subsidy died"
  momentum: up
  summary: >-
    Copilot token billing went live Jun 1 (10–50× bills, Opus multiplier
    7.5×→27×, paid code review); Cursor seat split; Anthropic Agent SDK credit
    split Jun 15. Flat-rate AI tooling is ending industry-wide — the meter is a
    boundary, not a business; the end state is vertical integration. Once you're
    metered, prompt caching is the biggest single lever on the bill — but the
    advertised 90% read discount is a bet on hit rate, not a setting you flip.
    W27: users are now routing around the bill itself — pxpipe renders source as
    PNGs to ride optical compression under text-token pricing (claims 59–74% off
    Fable 5), but image tokens cost the same per token and the "discount" is a
    17.8× compression ratio that lands in the lossy fall-off, so it trades
    cost/token for silent errors on code — the meter's own logic, turned on the user.
    W29: a *second* hidden term of the meter, beside caching — the tokenizer. The
    per-token list price isn't the price you pay; the tokenizer converts your bytes
    to tokens at a model-specific rate, and for code it diverges hard (one July
    benchmark: a 2,888-char TS file = 681 tokens on GPT's o200k vs 1,178 on Claude's
    current tokenizer, 1.73×). Anthropic's own docs put the newer tokenizer at ~30%
    more tokens for the same text, so a version bump is a re-pricing event at a stable
    rate — and Claude's tokenizer is unpublished, so the billed count is only an API
    round-trip. Compare models on cost-per-file, not cost-per-token.
    W29 (analyst lens): the *third* and largest hidden multiplier, beside caching and the
    tokenizer — reasoning/sampling. The frontier's capability gains moved to test-time compute:
    the model emits thousands of hidden thinking tokens per answer, billed at the OUTPUT rate
    (~5× input) and not shown to you (Anthropic docs: the "billed output token count will not
    match" the visible response; OpenAI: reasoning tokens billed as output, "not visible via the
    API"). Accuracy rises log-linear in compute so the last points are exponential — o3 on
    ARC-AGI went 75.7% at ~$26/task to 87.5% using 172× the compute (~$4,560/task, 1,024
    samples). Two knobs: think-longer (thinkingBudget) and sample-more (best-of-N, the "64
    subagents" behind GPT-5.6 Sol's unverified proof). Gemini 3.5 Pro gates Deep Think behind the
    $250/mo Ultra tier — the pricing tell. So the per-token floor and the per-answer ceiling move
    opposite: the cheap token buys a more expensive answer. Measure cost-per-solved-task, not
    cost-per-token.
    W30 (analyst lens): a *fourth* hidden term, and the first one shaped like a cliff rather than a
    multiplier — the long-context price tier. GPT-5.6 Sol advertises a 1,050,000-token window at
    $5/$30, but requests above 272,000 input tokens are billed 2× input / 1.5× output on the *entire*
    request. Codex's harness was pinned at 372,000, so it silently walked users 100k past the cliff;
    the July 19 metadata change (PR #33972, no blog post) moved the default back to 272,000 — not a
    nerf, a stop to the silent overcharge. The cliff tracks a real cost curve (attention prefill is
    quadratic — 372k² / 272k² ≈ 1.87, an 87% compute premium — plus a linear KV-cache tax), and the
    served range is already past where recall holds (NoLiMa: 10/12 models ≤ half their base score by
    32k). Anthropic ran the identical 2×/1.5×-above-200k cliff, then *removed* it (Mar 13) for flat
    1M pricing — so the two leading labs now bet opposite on whether long context is metered or
    absorbed. So-what: set your harness limit to the provider's price cliff, not its billboard
    window; budget to the effective window; the deciding quantity is cost-per-correct-answer at the
    length you actually use.
  issues:
    - { label: "2026-W23", link: "/reports/2026-W23.html" }
    - { label: "Dive · The Meter Is the Confession", link: "/reports/deep-dives/2026-06-07-ai-coding-honest-pricing.html" }
    - { label: "Dive · Prompt Caching Pays 90% Off", link: "/reports/deep-dives/2026-06-18-prompt-caching-hit-rate.html" }
