- slug: supply-chain-vs-throughput
  title: "Supply chain vs. AI throughput"
  momentum: up
  summary: >-
    Miasma (32 Red Hat npm packages, valid SLSA provenance via stolen OIDC)
    plus IronWorm (36 packages harvesting AI API keys). Provenance and
    install-script scanning both defeated. Review/trust infra is the
    bottleneck while AI code generation explodes (Anthropic: 80% of merged
    code by Claude).
    W28 (contrarian lens): the offensive version of the same imbalance. JADEPUFFER
    (Sysdig, Jul 1) — the first documented end-to-end LLM-run ransomware — got in
    through a *known* Langflow RCE (CVE-2025-3248) on an internet-exposed instance,
    moved on default credentials (minioadmin:minioadmin) and a second known CVE
    (Nacos CVE-2021-29441, default JWT key), and reached the target on root database
    credentials whose origin Sysdig couldn't even find (human-handed, off-camera).
    The agent's real skill was the automatable *middle* of the kill chain —
    enumerate, sweep for keys, chain a published CVE, self-correct a subprocess PATH
    bug in 31 seconds, encrypt — all commodity since Metasploit. The research says the
    ends are still hard: Fang's GPT-4 exploits 87% of one-days *with* the CVE
    description but 7% *without* (0% for Metasploit/ZAP), at ~$8.80 an exploit (2.8×
    cheaper than a human); Anthropic's GTG-1002 ran 80–90% autonomously but stayed
    human-gated, and "Claude's hallucinations… made a fully autonomous cyberattack not
    likely for now." So agents didn't raise the capability ceiling — they dropped the
    marginal cost of the already-possible attack, shifting the threat to volume and
    lower-skill operators against the exposed/unpatched/default surface. A
    defense-and-hygiene problem, not a superhacker.
    W29 (builder lens): the trust boundary moved inside your own toolchain — the coding
    agent itself is a networked program holding your keys and reading every file. An
    independent mitmproxy teardown (cereblab, Jul 13, single-source) caught xAI's Grok CLI
    uploading a whole 12 GB test repo (5.1 GiB, 73 chunks) to a `grok-code-session-traces`
    bucket, unredacted `.env` secrets included, plus files the agent was told not to open —
    then xAI open-sourced Grok Build (Apache 2.0) days later. Three egress channels (model
    request / telemetry / third-party MCP); only the model request is unavoidable, and Claude
    Code's telemetry redacts code+prompts+paths by default while Grok's did not. You can't tell
    from the marketing page — you proxy it (`HTTPS_PROXY` + `NODE_EXTRA_CA_CERTS`) or read the
    source. License ≠ safety (Grok open yet captured; Claude Code closed yet redacts).
  tension: >-
    Defenses ship at institution speed, attacks at copy-paste speed; the
    exploited OIDC ref-binding hole remains unfixed (npm v12 closes install
    scripts instead).
  issues:
    - { label: "2026-W23", link: "/reports/2026-W23.html" }
    - { label: "Dive · The Trust Stack", link: "/reports/deep-dives/2026-06-10-trust-stack-human-speed.html" }
    - { label: "Dive · The AI Ran the Ransomware", link: "/reports/deep-dives/2026-07-07-autonomous-ransomware-known-cve.html" }
