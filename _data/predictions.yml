- id: dive-2026-07-04-code-as-image-fidelity-floor
  made: "Dive · 2026-07-04"
  made_link: "/reports/deep-dives/2026-07-04-code-as-image-token-tax.html"
  text: >-
    No client-side text-as-image compression tool demonstrates ≥99% exact-string
    recall on code (identifiers, hashes, literals — not prose) while still cutting
