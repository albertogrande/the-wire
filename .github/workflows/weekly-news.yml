name: The Wire

on:
  schedule:
    # Monday 02:00 in Madrid (02:00 CEST / 01:00 CET) — early enough that this
    # big run finishes (~03:30) and its usage ages out of the ~5h rolling
    # window before the 09:00 workday, so the reader starts Monday on fresh
    # quota. Still ready at breakfast. Covers the just-completed Monday→Sunday
    # week. Cron is UTC, hence 00:00.
    - cron: "0 0 * * 1"
    # Backup retries: the API can be transiently overloaded (529) at 00:00 and
    # exhaust the action's retries (this happened 2026-06-22 — the weekly silently
    # didn't publish). These reruns self-skip in the `guard` job the moment
    # reports/<WEEK_ID>.md exists, so on a healthy week they cost nothing (no model
    # call); they only do real work when the primary run failed to publish.
    - cron: "0 3 * * 1"
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "weekly = essay + deep dive; deep-dive-only = just a deep dive; quarter = quarterly retrospective"
        type: choice
        options:
          - weekly
          - deep-dive-only
          - quarter
        default: weekly
      topic:
        description: "Deep-dive topic (optional; agent picks if empty)"
        type: string
        default: ""

permissions:
  contents: write
  issues: write
  id-token: write

# One weekly run at a time: a backup cron that fires while a run is still going
# waits rather than double-publishing; its guard then skips if already done.
concurrency:
  group: the-wire-weekly
  cancel-in-progress: false

jobs:
  # Idempotency guard: decide whether there's anything to do. In weekly mode, if
  # this week's issue is already published, every (backup) run after the first
  # becomes a ~10s no-op that never touches the model.
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      week_id: ${{ steps.check.outputs.week_id }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        env:
          MODE: ${{ github.event.inputs.mode || 'weekly' }}
        run: |
          WEEK_ID=$(date -d "last sunday" +%G-W%V)
          echo "week_id=$WEEK_ID" >> "$GITHUB_OUTPUT"
          if [ "$MODE" != "weekly" ]; then
            echo "Mode=$MODE (not weekly) — always run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ -f "reports/${WEEK_ID}.md" ]; then
            echo "reports/${WEEK_ID}.md already published — skipping this run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "reports/${WEEK_ID}.md missing — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  report:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Collect reader comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/reader
          : > /tmp/reader/comments.md
          for LABEL in weekly-news deep-dive; do
            for N in $(gh issue list --label "$LABEL" --state all --limit 4 --json number --jq '.[].number' 2>/dev/null); do
              gh issue view "$N" --json number,title,comments --jq '
                . as $i
                | [$i.comments[] | select(.author.login | test("\\[bot\\]$") | not)]
                | select(length > 0)
                | "## Issue #\($i.number): \($i.title)\n"
                  + (map("- \(.author.login) (\(.createdAt)):\n\(.body)\n") | join("\n"))
              ' >> /tmp/reader/comments.md 2>/dev/null || true
            done
          done
          echo "Collected $(wc -l < /tmp/reader/comments.md) lines of reader comments."

      - name: Compose prompt
        id: prompt
        env:
          MODE: ${{ github.event.inputs.mode || 'weekly' }}
          TOPIC: ${{ github.event.inputs.topic }}
        run: |
          if [ "$MODE" = "quarter" ]; then
            PROMPT="Run the-quarter skill (.claude/skills/the-quarter/SKILL.md): write The Wire's retrospective for the most recently completed calendar quarter to reports/quarters/ and update reports/MEMORY.md exactly as the skill instructs."
          elif [ "$MODE" = "deep-dive-only" ]; then
            PROMPT="Run the deep-dive skill (.claude/skills/deep-dive/SKILL.md)"
            if [ -n "$TOPIC" ]; then
              PROMPT="$PROMPT with this topic: $TOPIC."
            else
              PROMPT="$PROMPT — no topic given, pick the week's most consequential story yourself as the skill instructs."
            fi
            PROMPT="$PROMPT Write the dive to reports/deep-dives/ and update reports/MEMORY.md exactly as the skill instructs."
          else
            PROMPT="First run the weekly-news skill (.claude/skills/weekly-news/SKILL.md): research the last completed Monday-Sunday week and write the issue to reports/<WEEK_ID>.md, ending with your deep-dive topic pick. Reader comments (if any) are in /tmp/reader/comments.md. Then run the deep-dive skill (.claude/skills/deep-dive/SKILL.md) on that pick, reusing this session's research, writing to reports/deep-dives/. Update reports/MEMORY.md and reports/TASTE.md as both skills instruct."
          fi
          PROMPT="$PROMPT Write files only — do not commit, push, or open issues."
          echo "prompt=$PROMPT" >> "$GITHUB_OUTPUT"

      - name: Research and write
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          show_full_output: true
          # Quota policy: the weekly IS the product — Opus 4.8 (not Fable,
          # which is 2x the cost); max-turns caps runaway loops while leaving
          # room for the research fan-out + two pieces.
          claude_args: >-
            --model claude-opus-4-8
            --max-turns 200
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Bash(date *),Bash(ls *),Bash(mkdir *)"

      - name: Commit and push
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_REPORTS=$(git ls-files --others --exclude-standard reports/ | grep '\.md$' || true)
          git add reports/
          if git diff --cached --quiet; then
            echo "Nothing was generated." >&2
            exit 1
          fi
          if [ -z "$NEW_REPORTS" ]; then
            echo "No new report file was generated (only modifications staged)." >&2
            exit 1
          fi
          {
            echo "new_reports<<EOF"
            echo "$NEW_REPORTS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish: $(echo "$NEW_REPORTS" | xargs -n1 basename | paste -sd ', ' -)"
          # claude-code-action rewrites the remote URL to its app token and
          # revokes it when its step ends, so push with the workflow token.
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"

      - name: Open issues with the reports
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create weekly-news --color 1D76DB --description "The Week" 2>/dev/null || true
          gh label create deep-dive --color 5319E7 --description "Deep dives & specials" 2>/dev/null || true
          gh label create the-quarter --color 0E8A16 --description "Quarterly retrospectives" 2>/dev/null || true
          while IFS= read -r REPORT; do
            [ -z "$REPORT" ] && continue
            TITLE=$(grep -m1 '^# ' "$REPORT" | sed 's/^# //')
            case "$REPORT" in
              reports/deep-dives/*) LABEL=deep-dive; PREFIX="🔬" ;;
              reports/quarters/*)   LABEL=the-quarter; PREFIX="📚" ;;
              *)                    LABEL=weekly-news; PREFIX="📰" ;;
            esac
            gh issue create \
              --title "$PREFIX $TITLE" \
              --body-file "$REPORT" \
              --label "$LABEL"
          done <<< "${{ steps.commit.outputs.new_reports }}"

      # Quota ledger: every run appends its exact token/cost numbers from the
      # action transcript, even on failure — failed runs have costs too.
      - name: Record usage
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
          MODEL: claude-opus-4-8
        run: |
          mkdir -p usage
          [ -f usage/ledger.csv ] || echo "date_utc,workflow,run_id,result,model,turns,duration_ms,input_tokens,output_tokens,cache_read,cache_created,cost_usd" > usage/ledger.csv
          if [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
            jq -r --arg d "$(date -u +%Y-%m-%dT%H:%MZ)" --arg w "$GITHUB_WORKFLOW" --arg r "$GITHUB_RUN_ID" --arg m "$MODEL" '
              (last(.[] | select(.type=="result"))) as $res
              | [$d, $w, $r, (if $res.is_error then "error" else "ok" end), $m,
                 ($res.num_turns // 0), ($res.duration_ms // 0),
                 ($res.usage.input_tokens // 0), ($res.usage.output_tokens // 0),
                 ($res.usage.cache_read_input_tokens // 0), ($res.usage.cache_creation_input_tokens // 0),
                 ($res.total_cost_usd // 0)] | @csv' "$EXEC_FILE" >> usage/ledger.csv || \
              echo "$(date -u +%Y-%m-%dT%H:%MZ),$GITHUB_WORKFLOW,$GITHUB_RUN_ID,parse-failed,$MODEL,0,0,0,0,0,0,0" >> usage/ledger.csv
          else
            echo "$(date -u +%Y-%m-%dT%H:%MZ),$GITHUB_WORKFLOW,$GITHUB_RUN_ID,no-transcript,$MODEL,0,0,0,0,0,0,0" >> usage/ledger.csv
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add usage/ledger.csv
          git commit -m "Usage: $GITHUB_WORKFLOW run $GITHUB_RUN_ID" || exit 0
          git pull --rebase origin "$GITHUB_REF_NAME" || true
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"

  # Alert on a real failure (not a guard-skip) so a silent Monday miss can't
  # recur. Deduped per week: the first failed attempt opens an issue; later
  # failed retries comment on it instead of spawning duplicates.
  notify-failure:
    needs: [guard, report]
    if: always() && needs.report.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
          WEEK_ID: ${{ needs.guard.outputs.week_id }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh label create ops-alert --color B60205 --description "Newsroom run failures" 2>/dev/null || true
          EXISTING=$(gh issue list --label ops-alert --state open --json number,title \
            --jq ".[] | select(.title | contains(\"$WEEK_ID\")) | .number" | head -1)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Another attempt failed: $RUN_URL"
          else
            BODY=$(printf '%s\n\n%s\n\n%s\n' \
              "The scheduled weekly run for **$WEEK_ID** failed before publishing." \
              "Run: $RUN_URL" \
              "Backup crons at 03:00 and 06:00 UTC Monday retry automatically while reports/$WEEK_ID.md is missing. If all retries fail, run it by hand: Actions → The Wire → Run workflow (mode: weekly).")
            gh issue create \
              --title "⚠️ The Wire weekly run failed — $WEEK_ID" \
              --label ops-alert \
              --body "$BODY"
          fi
