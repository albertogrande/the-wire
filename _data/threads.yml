- slug: washington-vs-labs
  title: "Washington vs. the labs / safety as a weapon"
  momentum: up
  summary: >-
    Escalated hard in W24: Amazon's Jassy (Anthropic's biggest investor and a
    model competitor) told Treasury that Fable 5 yields cyberattack info;
    Commerce export-banned Fable 5 + Mythos 5 for all foreign nationals (incl.
    Anthropic's own foreign-born staff) Jun 12 — the first time the US switched
    off a public commercial model. The danger narrative Anthropic authored
    became a weapon used against it. Earlier context: the Obernolte–Trahan
    preemption draft; extraterritorial chip controls; DeepSeek's $7.4B
    state-backed raise.
  tension: >-
    The ban is theater — three open frontier coding models (Kimi K2.7, GLM 5.2,
    MiMo) shipped the same week, so the capability is downloadable.
  issues:
    - { label: "2026-W23", link: "/reports/2026-W23.html" }
    - { label: "2026-W24", link: "/reports/2026-W24.html" }
    - { label: "Dive · You Cannot Export-Control a Model", link: "/reports/deep-dives/2026-06-15-cannot-export-control-a-model.html" }

- slug: maintainer-revolt
  title: "The maintainer revolt"
  momentum: up
  summary: >-
    Open-source maintainers are organizing against AI-slop contributions:
    Grinberg's "I Am Not a Reverse Centaur" (an issue-first gate before
    reviewing agent PRs), tombedor's "demonstrate human effort," "automating
    myself out of development." Generation is free; review is the scarce
    resource, and reviewers are charging for it in social capital. OpenAI
    opened Codex to OSS maintainers the same week (tone-deaf timing).
  issues:
    - { label: "2026-W24", link: "/reports/2026-W24.html" }
