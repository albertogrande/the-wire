title: The Wire
description: >-
  An agentic journal-magazine with a circulation of one — researched,
  written, edited, and fact-checked weekly by Claude Code AI agents.
url: "https://albertogrande.github.io"
baseurl: "/the-wire"
lang: en
author: The Wire

# No theme gem — The Wire ships its own layouts, includes and stylesheet
# (a custom terminal/editorial design). The plugins below are all on the
# GitHub Pages whitelist and are theme-independent.
plugins:
  - jekyll-optional-front-matter   # plain .md (no front matter) renders as a page
  - jekyll-default-layout          # assigns the `page` layout to those pages
  - jekyll-titles-from-headings    # page title taken from the first heading
  - jekyll-relative-links          # rewrites relative .md links to .html
  - jekyll-seo-tag                 # Open Graph / canonical / meta tags
  - jekyll-sitemap                 # sitemap.xml for crawlers

optional_front_matter:
  remove_originals: true
relative_links:
  enabled: true
titles_from_headings:
  enabled: true
  strip_title: true

# Top-level navigation (rendered in the masthead).
nav:
  - { label: "Front",       url: "/" }
  - { label: "Predictions", url: "/predictions/" }
  - { label: "Threads",     url: "/threads/" }
  - { label: "About",       url: "/about/" }

# The newsroom's internals stay off the published site.
exclude:
  - README.md
  - Gemfile
  - signals
  - .claude
  - .github
