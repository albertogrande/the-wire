name: Daily Scout

on:
  schedule:
    # Daily, midnight in Madrid (00:00 CEST / 23:00 CET) — the sleep window,
    # so CI never competes with interactive use for the Max quota; still
    # captures the full day's signals. Cron is UTC, hence 22:00.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Capture today's signals
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >
            Run the daily-scout skill (.claude/skills/daily-scout/SKILL.md):
            capture the last 24h of signals across the beats and append them
            to the current week's signals/ file exactly as the skill
            instructs. Write the file only — do not commit or push.
          show_full_output: true
          # Quota policy: the scout is a capture job, not the product —
          # Sonnet at ~0.6x Opus token cost; max-turns caps runaway loops.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 30
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Bash(date *),Bash(ls *),Bash(mkdir *)"

      # claude-code-action reports success even when Claude errors out on
      # turn one (is_error: true in the result JSON), so assert the scout's
      # contract instead: the skill always writes a "## <today>" heading,
      # even on a quiet day.
      - name: Verify the scout actually ran
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          WEEK_FILE="signals/$(date -u +%G-W%V).md"
          if ! grep -q "^## $TODAY" "$WEEK_FILE" 2>/dev/null; then
            echo "::error::No '## $TODAY' section in $WEEK_FILE — Claude wrote nothing (silent auth/API failure?). Check the Capture step transcript."
            exit 1
          fi

      - name: Commit signals
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -d signals ]; then git add signals/; fi
          if git diff --cached --quiet; then
            echo "No new signals captured."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Scout: signals for $(date -u +%Y-%m-%d)"
          # claude-code-action rewrites the remote URL to its app token and
          # revokes it when its step ends, so push with the workflow token.
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"

      # Quota ledger: every run appends its exact token/cost numbers from the
      # action transcript, even on failure — failed runs have costs too.
      - name: Record usage
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
          MODEL: claude-sonnet-4-6
        run: |
          mkdir -p usage
          [ -f usage/ledger.csv ] || echo "date_utc,workflow,run_id,result,model,turns,duration_ms,input_tokens,output_tokens,cache_read,cache_created,cost_usd" > usage/ledger.csv
          if [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
            jq -r --arg d "$(date -u +%Y-%m-%dT%H:%MZ)" --arg w "$GITHUB_WORKFLOW" --arg r "$GITHUB_RUN_ID" --arg m "$MODEL" '
              (last(.[] | select(.type=="result"))) as $res
              | [$d, $w, $r, (if $res.is_error then "error" else "ok" end), $m,
                 ($res.num_turns // 0), ($res.duration_ms // 0),
                 ($res.usage.input_tokens // 0), ($res.usage.output_tokens // 0),
                 ($res.usage.cache_read_input_tokens // 0), ($res.usage.cache_creation_input_tokens // 0),
                 ($res.total_cost_usd // 0)] | @csv' "$EXEC_FILE" >> usage/ledger.csv || \
              echo "$(date -u +%Y-%m-%dT%H:%MZ),$GITHUB_WORKFLOW,$GITHUB_RUN_ID,parse-failed,$MODEL,0,0,0,0,0,0,0" >> usage/ledger.csv
          else
            echo "$(date -u +%Y-%m-%dT%H:%MZ),$GITHUB_WORKFLOW,$GITHUB_RUN_ID,no-transcript,$MODEL,0,0,0,0,0,0,0" >> usage/ledger.csv
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add usage/ledger.csv
          git commit -m "Usage: $GITHUB_WORKFLOW run $GITHUB_RUN_ID" || exit 0
          git pull --rebase origin "$GITHUB_REF_NAME" || true
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
