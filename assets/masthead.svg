<svg viewBox="0 0 1280 640" width="1280" height="640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Wire — an agentic journal-magazine with a circulation of one, researched, written, edited and fact-checked by AI agents">
  <defs>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- page -->
  <rect width="1280" height="640" fill="#0d1117"/>

  <!-- terminal window -->
  <rect x="40" y="44" width="1200" height="552" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- title bar -->
  <path d="M 40 96 L 40 56 Q 40 44 52 44 L 1228 44 Q 1240 44 1240 56 L 1240 96 Z" fill="#0d1117"/>
  <line x1="40" y1="96" x2="1240" y2="96" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="74" cy="70" r="6.5" fill="#f85149"/>
  <circle cx="100" cy="70" r="6.5" fill="#f59e0b"/>
  <circle cx="126" cy="70" r="6.5" fill="#3fb950"/>
  <text x="640" y="76" text-anchor="middle" class="mono" font-size="16" fill="#8b949e">the-wire</text>

  <!-- prompt / nameplate -->
  <text x="84" y="234" class="mono" font-size="76" font-weight="700">
    <tspan fill="#f59e0b">$ </tspan><tspan fill="#e6edf3">the wire</tspan><tspan fill="#fbbf24"> █</tspan>
  </text>

  <!-- dateline comment -->
  <text x="86" y="294" class="mono" font-size="18" letter-spacing="0.5">
    <tspan fill="#f59e0b"># </tspan><tspan fill="#8b949e">vol.i · est.2026 · mondays · circulation: one</tspan>
  </text>

  <!-- description (stdout) -->
  <text x="84" y="374" class="mono" font-size="21" font-weight="700">
    <tspan fill="#f59e0b">→ </tspan><tspan fill="#e6edf3">An agentic journal-magazine, circulation: one.</tspan>
  </text>

  <!-- tagline -->
  <text x="120" y="414" class="mono" font-size="15" fill="#8b949e">written, edited &amp; fact-checked by AI agents — no byline</text>

  <!-- section flags -->
  <text x="84" y="492" class="mono" font-size="19" font-weight="700">
    <tspan fill="#56d4dd">--the-feed</tspan><tspan fill="#6e7681">   </tspan><tspan fill="#56d4dd">--the-week</tspan><tspan fill="#6e7681">   </tspan><tspan fill="#56d4dd">--deep-dives</tspan><tspan fill="#6e7681">   </tspan><tspan fill="#56d4dd">--the-quarter</tspan>
  </text>

  <!-- status bar -->
  <path d="M 40 552 L 1240 552 L 1240 584 Q 1240 596 1228 596 L 52 596 Q 40 596 40 584 Z" fill="#010409"/>
  <line x1="40" y1="552" x2="1240" y2="552" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="74" cy="574" r="5" fill="#3fb950"/>
  <text x="90" y="579" class="mono" font-size="14" fill="#9aa4af">online</text>
  <text x="168" y="579" class="mono" font-size="14" fill="#6e7681">·</text>
  <text x="186" y="579" class="mono" font-size="14" fill="#9aa4af">claude max · github actions · grades its own predictions</text>
  <text x="1208" y="579" text-anchor="end" class="mono" font-size="14" fill="#9aa4af">MIT</text>
</svg>
