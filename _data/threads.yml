- slug: channel-war-offramps
  title: "The channel war / off-ramps"
  momentum: up
  summary: >-
    Model and open harness both commoditizing (Kimi K2.7-Code beats Opus 4.8 on
    MCPMark 81.1/76.4 at ~1/10 price; OpenCode 8M MAU, MIT), so spend moved to
    distribution: Google kills Gemini CLI for closed `agy`; OpenAI buys the Ona
    surface + rents Oracle's Universal Credits rail ($638B RPO); Anthropic's
    $150M Claude Corps seeds an install base. Four off-ramps —
    terminal/environment/rail/install base (+political). The moat is the
    channel, not the weights. W24: the political off-ramp went live — export
    controls hit the closed/legible US leader while open weights walk free.
    W25: the MoE angle reinforces it — sparsity (GLM-5.2 744B/40B, ~5.4% active)
    makes open models cheap to serve at batch scale but inflates the
    must-fit-in-VRAM number, so the architecture that cheapens the API is the
    same one that keeps you renting it. W25 (confirmed live): the state switched
    off the legible closed leader and users routed to substitutes within days —
    GLM-5.2 open-released MIT, an Ask HN local-model thread hit 540 points, and
    OpenCode passed Claude Code on stars (~172k/124k). The hedge users reach for
    is the model-agnostic harness, not the model; provider-portability became
    risk management, not just cost and latency. W25 (buyer's counter-move): the
    hedge is real but only syntactic — a gateway/harness swaps the API in an
    afternoon, but prompts, tool-calling reliability, and warmed caches don't
    transfer, so true portability is a continuously *eval'd* fallback, not a
    wired one (tiered: lock-in on core, portable on the can't-go-dark slice).
    W26 (the distillation pipe): capability leaks via *outputs*, not weights.
    Anthropic told the Senate that Alibaba's Qwen lab ran 28.8M Claude exchanges
    through ~25k fake accounts (Apr 22–Jun 5) to imitate its software-engineering
    and agentic behavior. Because the API exposes no soft targets (Anthropic: no
    logprobs; OpenAI: top-20), the copy is hard-sample imitation — which is why it
    took tens of millions of queries — and imitation runs ~1:100 of pretraining
    cost, so terms forbid it but the economics fund it. You can't contract-control
    a capability once its outputs are readable, just as you can't export-control
    downloadable weights; and Qwen ships open-weight, so the distilled behavior
    re-enters the commons.
    W26 (the price floor): DeepSeek made its 75%-off V4-Pro cut permanent
    (~$0.44/$0.87 per Mtok, ~11–34× under GPT-5.5 standard), and the cut reads as
    commoditize-your-complement (Spolsky/Gwern) — inference is DeepSeek's
    complement, not its product, so it prices the token at the floor to deny
    margin to the labs for whom the token *is* the business. The floor is
    structural, not promotional, because DeepSeek serves its own open weights: the
    API can't hold a markup over an artifact anyone can host. The price itself is
    now the commoditized layer.
    W27 (the forensic answer to distillation): an HN thread (1,207 pts) reverse-
    engineered Claude Code embedding hidden markers — invisible Unicode plus
    subtle format shifts — into requests, encoding ~2 bits (China timezone +
    reseller-hostname blacklist). Framed as surveillance, it's really anti-
    distillation forensics: a tripwire so a reseller's leaked outputs carry a
    traceable tag. But the channel is the weakest possible — a known, contiguous
    code-point range, deletable with one substitution, gone after normalization —
    so it catches the lazy once and dies to `tr -d`. Confirms the thread: you
    can't contract- or mark-control a capability whose outputs are readable text.
    W27 (the watermark half, quantified): a statistical text watermark — a green-list
    logit bias read back with a z-test — is the strongest provenance marking (no symbol
    to grep), but its signal is token-count × entropy, so paraphrase nulls it: soft-
    watermark TPR 99%→15% after five recursive rewrites (Sadasivan), SynthID scrubbed
    >90% by baseline paraphrase (ETH SRI Lab). The best-possible detector is capped at
    AUROC ≤ ½ + TV − TV²/2, and laundering pushes TV→0 → coin flip. Same law again:
    you can't provenance-control a capability whose outputs are readable text.
    W28 (the exception the thread missed): everything above says the artifact
    commoditizes — weights open, outputs distillable, price at the floor. This is
    the one input that doesn't. SpaceX bought Cursor's parent Anysphere for $60B
    (>1M daily devs, ~$4B ARR) and trained Grok 4.5 partly on its IDE data. The
    real asset isn't the editor or the distribution — it's the accept button: every
    accept/reject/edit is a labeled `(chosen, rejected)` preference pair (exactly
    DPO's input) on a real coding task, and that human correctness-judgment can't be
    scraped (GitHub gives code, not the ranking) or distilled (outputs aren't
    preferences). Synthetic RLAIF substitutes for *style* but is "marginally above
    random on correctness," which is where coding lives — so labs still treat human
    preference as the moat. Bound honestly: the valuable slice is fenced (Cursor
    Business = Privacy Mode/ZDR by default, "never trained on," ~65% of revenue),
    the label is noisy (Copilot ~30% accept, accept-then-delete), and the moat
    poisons its own benchmark (train on live issue-solving → parity indistinguishable
    from contamination, 11.7–31.6% verbatim; Grok shipped no system card). The moat
    isn't the model or the weights — it's whoever owns the surface where the accept
    happens.
  issues:
