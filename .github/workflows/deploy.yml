name: Deploy site

# Builds the Astro site and publishes it to GitHub Pages. Runs on every push to
# main, AND after the newsroom content workflows finish — their commits are made
# with GITHUB_TOKEN, which by design does NOT trigger `push` workflows, so the
# workflow_run trigger is what actually publishes scheduled scout/dive/weekly
# content. Pages must be set to "GitHub Actions" as its source.
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Daily Scout", "Daily Dive", "The Wire", "Prediction Watch"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; don't cancel a publish midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
