- slug: autonomy-before-brakes
  title: "Autonomy before its brakes"
  momentum: up
  summary: >-
    Agents shipped proactive-by-default (Fable 5 "relentlessly proactive,"
    Claude Code nested sub-agents 5-deep + doubled 5h limits, FablePool) before
    the cost-control/consent/observability layer. Canaries: a DN42 agent ran a
    $6,531 AWS bill in ~24h (cut to $1,894); Anthropic apologized for an
    invisible Fable distillation guardrail ("stealth throttling"). Liability
    (the operator eats it; AWS has no hard cap by design) plus disclosure
    (Colorado AI Act, FCC KYC FNPRM) = undisclosed automation becoming a
    regulated category. The definitional cut: "agent" is a control-flow dial
    (the model owns the loop), not a product — and agency's cost IS the brakes
    problem (nondeterminism, per-step token re-read, blast radius). The market
    is already voting low-agency: MCP (tool rung) adopted, A2A (multi-agent
    rung) enterprise-announced but developer-shrugged. The hands-on brake the
    reader actually has: context compaction. Claude Code's auto-save is lossy
    and fires on a hidden, undocumented threshold — control it (/clear,
    /compact at safe points, CLAUDE.md preserve-rules) or it summarizes away the
    state you needed, and silently re-bills the prompt cache each time. The
    file-system brake for *parallel* agents is worktree isolation — a shared
    checkout is global mutable state, so concurrent agent writers silently
    corrupt each other; git worktrees give each its own files plus an enforced
    one-branch lock. Oak ("Git alternative for agents") reframes it as a new-VCS
    problem, but isolation is already solved, free, in git. W26 (operator lens):
    the brake before compaction even fires is the context *budget* — the usable
    window is far smaller than the advertised one (NoLiMa: 11/12 models fell
    below 50% short-context accuracy at 32K), so practitioners cap at ~60%, lower
    the auto-compact trigger (env vars), and do the handoff by hand
    (dump-to-markdown + /clear) rather than letting a degraded summarizer choose
    what survives. v2.1.191's /rewind (resume from before /clear) finally makes
    aggressive clearing recoverable. W26 (builder lens): the brake on *side
    effects* is idempotency — three layers retry a tool call unasked (the SDK,
    max_retries=2; Claude Code's stream-stall retry; the model itself re-calling
    on any result that reads like failure), and a dropped network ACK can't tell
    never-ran from ran-and-lost-the-receipt, so you get at-least-once, never
    exactly-once. The fix is the old one, newly load-bearing: an idempotent method
    (RFC 9110 — PUT/DELETE yes, POST no), a content-derived idempotency key minted
    in the tool wrapper (not in the prompt, where the model re-randomizes it every
    turn), or a unique-constraint upsert. v2.1.183's auto-mode block on destructive
    git/terraform/pulumi/cdk destroy is the harness conceding the same point with a
    blunt instrument. The same effective-window limit reframes the long-context-vs-RAG
    debate: RULER puts GPT-4's usable context at ~64K of its advertised 128K, and a 200K
    stuff-it-all-in query costs ~25× a retrieval call while changing the answer only ~1
    time in 3 (DeepMind Self-Route: 63% of predictions identical) — so retrieval and a
    cheap RAG-first router stay the default, not a museum piece.
    W27 (operator lens): the *permission* brake is a string match, and strings can't read
    intent. A deny rule like `Bash(curl github.com *)` is defeated by an option before the
    URL, `https`, an `-L` redirect, a `$URL` variable, or a double space — Anthropic's own
    docs call argument-constraining Bash rules "fragile" — and Adversa proved the structural
    version: chaining >50 subcommands made Claude Code skip deny enforcement and fall back to
    "ask" (ticket CC-643 had capped subcommand analysis at 50; since patched with a
    tree-sitter parser ~v2.1.90). The guardrail that actually holds is a PreToolUse hook —
    real code reading `.tool_input.command` and vetoing via exit 2 or
    `permissionDecision:"deny"`, evaluated before permission rules so it beats an allow.
    Anthropic's own recommended design: allow `Bash`, deny curl/wget in the hook, route web
    access through `WebFetch(domain:...)`, and add the sandbox for the OS layer. The catch
    that just bit people: v2.1.195 made hook matchers exact-match instead of substring, so a
    hyphenated MCP matcher like `mcp__brave-search` silently stopped firing — it needs
    `mcp__brave-search__.*`.
    W27 (builder lens): the brake on the *tool call itself* is grammar-constrained emission.
    A model-version bump silently re-tunes the schema *prior* — Opus 4.8 and Sonnet 5 (defaulting
    under users on Jul 1) invented keys in a nested edit tool's `edits[]` (`requireUnique`, `oldText2`,
    `matchCase`…) about 20% of calls, while the load-bearing `oldText`/`newText` stayed byte-correct:
    a shape error, not a capability drop, because the prior was trained on Claude Code's flat,
    key-forgiving harness and a strict nested schema is off-distribution. Fix in order: `strict:true`
    (grammar-constrained sampling makes an undeclared key un-samplable — OpenAI's same technique took
    schema adherence from under 40% to 100%) → flatten the schema toward the trained shape → a tolerant
    executor that drops and logs unknown keys. The catch: constrain the emission, not the reasoning —
    JSON-mode wrecks chain-of-thought (Claude-3-Haiku fell 86.5%→23.4% on GSM8K under format restriction),
    so reason in prose and emit under grammar. An upgrade is a portability event: re-eval your tool calls
    on every model bump.
    W28 (builder lens): the brake once the agent *acts unattended* is the audit trail. Claude Code
    flipped three defaults in a week — v2.1.198 (Jul 1) made background subagents auto-commit, push, and
    open a draft PR "instead of stopping to ask"; v2.1.200 (Jul 3) changed the default permission mode to
    Manual and stopped AskUserQuestion auto-continuing; v2.1.202 (Jul 6) added workflow.run_id/name OTel
    attributes to reconstruct a run. Writing moved off-camera; deciding came back on-camera. A permission
    prompt gates the next action — it is no evidence of the hundred already taken — and the isolation
    guard you'd otherwise trust leaked twice in eight days (v2.1.198 and v2.1.203 both fixed background
    subagents escaping their worktree into the parent checkout), so you want an *independent* record. Two
    layers: git is a free content-hashed, chained log (force small, attributed commits); the gap between
    commits is what OpenTelemetry's GenAI conventions capture (invoke_agent / execute_tool spans,
    gen_ai.tool.call.arguments/result — still Development status at SemConv 1.40.0). Claude Code emits it
    today (CLAUDE_CODE_ENABLE_TELEMETRY=1; claude_code.tool_result / tool_decision events). The trust hole:
    a log the actor writes about itself is a diary — Halo (Show HN, Jul 8) answers with append-only,
    SHA-256 hash-chained records plus an external witness, "verify without trusting who produced it" (aimed
    at SOC 2 / EU AI Act). So-what: generation went unattended, review didn't (Anthropic merges ~80%
    Claude-written code), so the reviewer is the bottleneck and the auditable surface is the product.
    W28 (operator lens): the same context-budget logic runs in reverse — how to *add* capability
    without a standing bill. A Claude Code skill is progressive disclosure (Anthropic): name +
    description are preloaded into the system prompt every session, but the full SKILL.md body loads
    only when the skill triggers, and bundled files only on demand. So a skill is capability bought on
    credit — you pay the description standing, the body is deferred — the exact inverse of a CLAUDE.md
    line, which is billed every turn (and drops adherence past ~200 lines). The standing tax is
    bounded: the skill listing is capped at ~1% of the window (skillListingBudgetFraction), each
    description+when_to_use truncated at 1,536 chars, and on overflow the least-used skills' descriptions
    drop first (/doctor shows it). Once invoked, a body stays in context all session (keep it <500
    lines), and compaction re-attaches only the first 5,000 tokens of each skill under a 25,000-token
    combined budget, most-recent-first — so older skills silently fall off and need re-invoking.
    disable-model-invocation:true removes even the description from context (zero standing cost,
    manual-only). The description is a router, not a summary. News peg: v2.1.199 (Jul 2) made stacked
    invocations (`/a /b do X`) load up to 5 leading skills, so procedures finally compose. Rule of
    thumb from the docs: CLAUDE.md holds facts true every turn; a skill holds a procedure used some
    turns ("when a CLAUDE.md section has grown into a procedure rather than a fact").
    W28 (builder lens): a new brake surface opened — the browser as agent runtime. Chrome DevTools
    for agents went stable (MCP server + a token-efficient CLI, 47 tools on Puppeteer/CDP) and WebMCP
    — the page-declares-its-own-tools API — dropped a fresh W3C Community-Group draft (10 Jul, Chrome
    origin trial). Three ways an agent reads a page, on a structure gradient: pixels (a 1080p screenshot
    = 2,691 visual tokens per step on Opus 4.8, coords "approximate… verify"), the accessibility-tree
    snapshot (roles + names + stable refs, ~200–400 tokens, click a handle not a hypothesis), and
    page-declared WebMCP tools (`navigator.modelContext.registerTool`, a typed function call, zero
    DOM-walk). More structure the page gives → less the agent guesses → lower token + flake cost. The
    brake gap: a WebMCP tool is an authenticated same-origin action, and the spec *has no consent
    mechanism* (delegated to "the agent provider and user agent") + ships `untrustedContentHint`
    because a tool's output can carry a prompt injection back. So-what: switch browser agents to
    snapshot-first now; treat page-declared tools like any other untrusted input.
    W29 (operator lens): the context brake *before the conversation starts* — the fixed preamble
    every request pays. A wire-level proxy measured Claude Code sending ~33k tokens before the user
    prompt vs OpenCode's ~7k (Systima, HN #1, 206 comments — one team's snapshot), and ~72% of it is
    tool schemas (27 built-in tools ~24k), not the system prompt (~6.5k). A leaner trace found a
    14,328-token floor via a cache_read reset, so treat the total as version/config-specific in a
    ~14k–33k band; the mechanism (fixed, re-sent every request, tool-schema-dominated) is the durable
    part. MCP is the swing line: every connected server injects all its tool schemas into every
    request whether used or not (Postgres ~35 tokens, GitHub MCP ~55k; a loaded real-world setup runs
    75–85k = a third of the window gone before a keystroke). Prompt caching refunds the *dollars* (the
    byte-identical prefix caches at ~0.1×) but not the *window* (still occupied, hits compaction
    sooner) or the *attention*: Anthropic's own number — deferring so the model sees ~3–5 tools not
    58 raised MCP-eval accuracy 79.5%→88.1% on Opus 4.5 and 49%→74% on Opus 4, so a crowded tool list
    makes the model worse, and caching doesn't refund those points. Fix chain: /context reads the bill
    by category; /doctor (alias /checkup, v2.1.205, Jul 8) prunes unused skills/MCP against their
    context cost, dedups CLAUDE.md, and flags slow hooks; defer_loading:true / the Tool Search Tool
    cuts 58 tools across 5 servers from ~55k to ~8.7k (85%, preserving 191,300 vs 122,800 tokens) — or
    just disconnect the servers you aren't using. Caveat: deferral is an opt-in setting on the
    Developer Platform, not a CLI default (the open question, and this dive's prediction). So-what: the
    preamble isn't free just because it's cached — measure, prune, defer to buy back window + attention.
